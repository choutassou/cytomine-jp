user  nginx;
worker_processes  1;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;
events {
  worker_connections  1024;
}
http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
  access_log  /var/log/nginx/access.log  main;
  sendfile        on;
  keepalive_timeout  65;
  proxy_buffer_size           16k;
  proxy_buffers               8 16k;
  proxy_busy_buffers_size     32k;
  large_client_header_buffers 4 16k;
  # Docker embedded DNS — needed for lazy upstream resolution so a single down
  # backend doesn't prevent nginx from starting.
  resolver 127.0.0.11 valid=30s ipv6=off;
  # HTTP — redirect to HTTPS: Keycloak's auth-session cookies are Secure;SameSite=None,
  # which browsers drop on plain HTTP, so login only works over TLS.
  server {
    listen       80;
    server_name  _;
    return 301 https://$host$request_uri;
  }
  server {
    listen       443 ssl;
    server_name  _;
    ssl_certificate     /etc/nginx/certs/cytomine.crt;
    ssl_certificate_key /etc/nginx/certs/cytomine.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Reverse-proxy every backend under the same origin so the browser only needs port 443.
    # X-Forwarded-Port intentionally omitted from /iam so Keycloak's issuer does not emit a port.
    client_max_body_size 0;
    location /iam/ {
      set $upstream_iam iam;
      proxy_pass http://$upstream_iam:8100;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
    }
    location /api/ {
      set $upstream_core core;
      proxy_pass http://$upstream_core:8080;
      proxy_http_version 1.1;
      proxy_request_buffering off;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
      proxy_read_timeout 300s;
    }
    location /ims/ {
      set $upstream_pims pims;
      proxy_pass http://$upstream_pims:5000;
      proxy_http_version 1.1;
      proxy_request_buffering off;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
      proxy_read_timeout 300s;
    }
    location /app-engine/ {
      set $upstream_appengine app-engine;
      proxy_pass http://$upstream_appengine:8080;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
      proxy_read_timeout 300s;
    }
    location /cbir/ {
      set $upstream_cbir cbir;
      proxy_pass http://$upstream_cbir:6000;
      proxy_set_header Host              $host;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
    }
    location /sam/ {
      set $upstream_sam sam;
      proxy_pass http://$upstream_sam:8000;
      proxy_set_header Host              $host;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
    }
    location = /configuration.json {
      alias /tmp/configuration.json;
    }
    location / {
      root   /app;
      index  index.html;
      try_files $uri $uri/ /index.html;
    }
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
      root   /usr/share/nginx/html;
    }
  }
}
